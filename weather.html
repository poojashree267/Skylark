<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#FFC857;
    --accent-ink:#3a2c00;
    --card-bg:rgba(15,23,42,.45);
    --card-bg-soft:rgba(15,23,42,.28);
    --card-border:rgba(255,255,255,.18);
    --text:#ffffff;
    --text-dim:rgba(255,255,255,.72);
    --text-faint:rgba(255,255,255,.5);
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{ min-height:100vh; }

  body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:28px 18px;
    color:var(--text);
    background:linear-gradient(160deg, var(--g1) 0%, var(--g2) 55%, var(--g3) 100%);
    transition:background 1.1s ease;
    --g1:#FFD78A; --g2:#5AA9E6; --g3:#2E6FB7;
  }

  /* ---------- Themes ---------- */
  body.theme-clear-day   { --g1:#FFD78A; --g2:#5AA9E6; --g3:#2E6FB7; }
  body.theme-clear-night { --g1:#3B3F77; --g2:#23264A; --g3:#0B0C1E; }
  body.theme-clouds-day  { --g1:#D7E1EA; --g2:#93A4B8; --g3:#5C6B7E; }
  body.theme-clouds-night{ --g1:#5B6478; --g2:#383F52; --g3:#1A1D27; }
  body.theme-rain        { --g1:#7E94AC; --g2:#4C617A; --g3:#1F2D3D; }
  body.theme-thunder     { --g1:#54607A; --g2:#333D52; --g3:#0E1118; }
  body.theme-snow        { --g1:#F3F8FD; --g2:#CFE0F0; --g3:#9FB8D2; }
  body.theme-mist        { --g1:#E2E8EE; --g2:#B7C2CD; --g3:#8493A3; }

  /* ---------- Layout ---------- */
  .app{
    width:100%;
    max-width:430px;
  }

  .app-header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:18px;
    padding:0 4px;
  }

  .app-header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-style:italic;
    font-size:26px;
    letter-spacing:.01em;
  }

  .app-header h1 span{
    font-style:normal;
    display:block;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:4px;
  }

  .unit-toggle{
    display:flex;
    background:var(--card-bg-soft);
    border:1px solid var(--card-border);
    border-radius:999px;
    padding:3px;
    backdrop-filter:blur(10px);
  }

  .unit-toggle button{
    border:none;
    background:transparent;
    color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    font-weight:500;
    padding:6px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:background .25s ease, color .25s ease;
  }

  .unit-toggle button.active{
    background:var(--accent);
    color:var(--accent-ink);
  }

  /* ---------- Search ---------- */
  .search{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }

  .search input{
    flex:1;
    padding:14px 18px;
    border:1px solid var(--card-border);
    outline:none;
    border-radius:var(--radius-md);
    font-size:15px;
    font-family:'Inter',sans-serif;
    background:var(--card-bg-soft);
    backdrop-filter:blur(10px);
    color:var(--text);
  }

  .search input::placeholder{ color:var(--text-faint); }

  .search button{
    border:none;
    border-radius:var(--radius-md);
    cursor:pointer;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .search .btn-search{
    padding:0 22px;
    background:var(--accent);
    color:var(--accent-ink);
    transition:transform .15s ease, filter .15s ease;
  }
  .search .btn-search:hover{ filter:brightness(1.08); }
  .search .btn-search:active{ transform:scale(.97); }

  .search .btn-locate{
    width:48px;
    background:var(--card-bg-soft);
    border:1px solid var(--card-border);
    backdrop-filter:blur(10px);
    color:var(--text);
    transition:background .2s ease;
  }
  .search .btn-locate:hover{ background:var(--card-bg); }
  .search .btn-locate svg{ width:18px; height:18px; }

  /* ---------- Recent chips ---------- */
  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:18px;
    min-height:1px;
  }

  .chip{
    border:1px solid var(--card-border);
    background:var(--card-bg-soft);
    color:var(--text-dim);
    font-size:12px;
    font-family:'Inter',sans-serif;
    padding:6px 13px;
    border-radius:999px;
    cursor:pointer;
    backdrop-filter:blur(8px);
    transition:background .2s ease, color .2s ease;
  }
  .chip:hover{ background:var(--card-bg); color:var(--text); }

  /* ---------- Status (loading / error / empty) ---------- */
  .status{
    display:none;
    text-align:center;
    padding:46px 20px;
    border:1px solid var(--card-border);
    border-radius:var(--radius-lg);
    background:var(--card-bg);
    backdrop-filter:blur(16px);
    font-size:14px;
    color:var(--text-dim);
  }
  .status.visible{ display:block; }
  .status .status-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    color:var(--text);
    margin-bottom:6px;
  }

  .spinner{
    width:30px; height:30px;
    border-radius:50%;
    border:3px solid var(--card-border);
    border-top-color:var(--accent);
    margin:0 auto 16px;
    animation:spin 0.9s linear infinite;
  }

  /* ---------- Hero ---------- */
  .hero{
    display:none;
    border:1px solid var(--card-border);
    border-radius:var(--radius-lg);
    background:var(--card-bg);
    backdrop-filter:blur(18px);
    padding:8px 28px 26px;
    text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.18);
    animation:rise .5s ease both;
  }
  .hero.visible{ display:block; }

  .scene{ width:170px; height:118px; margin:0 auto; display:block; overflow:visible; }
  .scene > g{ display:none; }
  .scene[data-active="sun"]    #scene-sun{ display:block; }
  .scene[data-active="moon"]   #scene-moon{ display:block; }
  .scene[data-active="clouds"] #scene-clouds{ display:block; }
  .scene[data-active="rain"]   #scene-rain{ display:block; }
  .scene[data-active="thunder"]#scene-thunder{ display:block; }
  .scene[data-active="snow"]   #scene-snow{ display:block; }
  .scene[data-active="mist"]   #scene-mist{ display:block; }

  .sun-rays{ transform-box: fill-box; transform-origin:50% 50%; animation:spin 50s linear infinite; }
  .moon-stars circle{ animation:twinkle 2.6s ease-in-out infinite; }
  .moon-stars circle:nth-child(2){ animation-delay:.6s; }
  .moon-stars circle:nth-child(3){ animation-delay:1.2s; }

  .cloud-back{ animation:drift 16s ease-in-out infinite; transform-box:fill-box; }
  .cloud-front{ animation:drift 11s ease-in-out infinite reverse; transform-box:fill-box; }
  .cloud-single{ animation:drift 14s ease-in-out infinite; transform-box:fill-box; }

  .drop{ stroke:rgba(255,255,255,.85); stroke-width:3; stroke-linecap:round; animation:fall-rain 1.1s linear infinite; transform-box:fill-box; }
  .drop:nth-child(2){ animation-delay:.25s; }
  .drop:nth-child(3){ animation-delay:.5s; }
  .drop:nth-child(4){ animation-delay:.75s; }
  .drop:nth-child(5){ animation-delay:.35s; }

  .bolt{ animation:flash 2.6s ease-in-out infinite; transform-box:fill-box; }

  .flake{ animation:fall-snow 4.5s linear infinite; transform-box:fill-box; }
  .flake:nth-child(3){ animation-delay:1s; }
  .flake:nth-child(4){ animation-delay:2s; }
  .flake:nth-child(5){ animation-delay:3s; }
  .flake:nth-child(6){ animation-delay:.5s; }

  .fog{ animation:drift 13s ease-in-out infinite; transform-box:fill-box; }
  .fog:nth-child(3){ animation-direction:reverse; animation-duration:17s; }
  .fog:nth-child(4){ animation-duration:11s; }

  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes twinkle{ 0%,100%{ opacity:.25; } 50%{ opacity:1; } }
  @keyframes drift{ 0%,100%{ transform:translateX(-7px); } 50%{ transform:translateX(7px); } }
  @keyframes fall-rain{ 0%{ transform:translateY(-4px); opacity:0; } 25%{ opacity:1; } 100%{ transform:translateY(16px); opacity:0; } }
  @keyframes fall-snow{ 0%{ transform:translate(0,-6px) rotate(0deg); opacity:0; } 15%{ opacity:1; } 100%{ transform:translate(6px,52px) rotate(180deg); opacity:0; } }
  @keyframes flash{ 0%,40%,100%{ opacity:.15; } 45%,55%{ opacity:1; } 60%{ opacity:.15; } }
  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }

  .temp-row{
    display:flex;
    align-items:flex-start;
    justify-content:center;
    gap:4px;
    line-height:1;
    margin-top:4px;
  }
  .temp{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(64px,17vw,96px);
    letter-spacing:-0.02em;
  }
  .temp-unit{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:28px;
    margin-top:14px;
    color:var(--text-dim);
  }

  .condition{
    font-size:15px;
    color:var(--text-dim);
    text-transform:capitalize;
    margin-top:2px;
    letter-spacing:.02em;
  }

  .city{
    font-family:'Fraunces',serif;
    font-size:24px;
    font-weight:600;
    margin-top:16px;
  }

  .meta-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-faint);
  }

  /* ---------- Details grid ---------- */
  .details{
    display:none;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:14px;
  }
  .details.visible{ display:grid; animation:rise .55s ease both; }

  .card{
    border:1px solid var(--card-border);
    background:var(--card-bg);
    backdrop-filter:blur(16px);
    border-radius:var(--radius-md);
    padding:16px 18px;
  }

  .card.span-2{ grid-column:1 / -1; display:flex; justify-content:space-between; }

  .card-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--text-faint);
    font-weight:600;
  }
  .card-label svg{ width:14px; height:14px; flex-shrink:0; opacity:.9; }

  .card-value{
    font-family:'JetBrains Mono',monospace;
    font-size:22px;
    font-weight:500;
    margin-top:10px;
  }
  .card-value small{
    font-size:13px;
    font-weight:400;
    color:var(--text-dim);
  }

  /* ---------- Misc ---------- */
  .footnote{
    text-align:center;
    font-size:11px;
    color:var(--text-faint);
    margin-top:16px;
    letter-spacing:.04em;
  }

  @media (max-width:380px){
    .app-header h1{ font-size:22px; }
    .temp{ font-size:72px; }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body class="theme-clear-day">

<div class="app">

  <header class="app-header">
    <h1><span>Today's forecast</span>Skylark</h1>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button id="unitC" class="active" onclick="setUnit('metric')">°C</button>
      <button id="unitF" onclick="setUnit('imperial')">°F</button>
    </div>
  </header>

  <form class="search" id="searchForm">
    <input id="cityInput" type="text" placeholder="Search a city..." autocomplete="off">
    <button type="submit" class="btn-search">Search</button>
    <button type="button" class="btn-locate" id="locateBtn" title="Use my location" aria-label="Use my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
      </svg>
    </button>
  </form>

  <div class="chips" id="chips"></div>

  <!-- Status: loading / error / empty -->
  <div class="status" id="status">
    <div class="spinner" id="spinner" style="display:none;"></div>
    <div class="status-title" id="statusTitle">Find your sky</div>
    <div id="statusBody">Search a city or share your location to see the current conditions.</div>
  </div>

  <!-- Hero -->
  <section class="hero" id="hero">
    <svg class="scene" id="scene" data-active="sun" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">

      <g id="scene-sun">
        <g class="sun-rays">
          <g stroke="#FFC857" stroke-width="3" stroke-linecap="round">
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(0 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(45 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(90 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(135 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(180 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(225 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(270 100 70)"/>
            <line x1="100" y1="26" x2="100" y2="40" transform="rotate(315 100 70)"/>
          </g>
        </g>
        <circle cx="100" cy="70" r="26" fill="#FFC857"/>
      </g>

      <g id="scene-moon">
        <g class="moon-stars" fill="#fff">
          <circle cx="42" cy="28" r="1.6"/>
          <circle cx="150" cy="22" r="1.4"/>
          <circle cx="168" cy="50" r="1.8"/>
          <circle cx="34" cy="62" r="1.3"/>
        </g>
        <path d="M118,40 A30,30 0 1 0 118,100 A22,22 0 1 1 118,40 Z" fill="#F4F1EA"/>
      </g>

      <g id="scene-clouds">
        <g class="cloud-back">
          <ellipse cx="62" cy="82" rx="32" ry="19" fill="rgba(255,255,255,.5)"/>
          <ellipse cx="86" cy="72" rx="24" ry="17" fill="rgba(255,255,255,.5)"/>
        </g>
        <g class="cloud-front">
          <ellipse cx="120" cy="92" rx="40" ry="22" fill="rgba(255,255,255,.9)"/>
          <ellipse cx="150" cy="82" rx="28" ry="19" fill="rgba(255,255,255,.9)"/>
          <ellipse cx="98" cy="96" rx="26" ry="17" fill="rgba(255,255,255,.9)"/>
        </g>
      </g>

      <g id="scene-rain">
        <g class="cloud-single">
          <ellipse cx="100" cy="58" rx="42" ry="23" fill="rgba(255,255,255,.9)"/>
          <ellipse cx="130" cy="52" rx="28" ry="19" fill="rgba(255,255,255,.9)"/>
          <ellipse cx="74" cy="62" rx="24" ry="16" fill="rgba(255,255,255,.9)"/>
        </g>
        <g class="drops">
          <line class="drop" x1="76" y1="92" x2="70" y2="106"/>
          <line class="drop" x1="96" y1="92" x2="90" y2="106"/>
          <line class="drop" x1="116" y1="92" x2="110" y2="106"/>
          <line class="drop" x1="136" y1="92" x2="130" y2="106"/>
          <line class="drop" x1="86" y1="100" x2="80" y2="114"/>
        </g>
      </g>

      <g id="scene-thunder">
        <g class="cloud-single">
          <ellipse cx="100" cy="56" rx="42" ry="23" fill="rgba(255,255,255,.78)"/>
          <ellipse cx="130" cy="50" rx="28" ry="19" fill="rgba(255,255,255,.78)"/>
          <ellipse cx="74" cy="60" rx="24" ry="16" fill="rgba(255,255,255,.78)"/>
        </g>
        <path class="bolt" d="M106,82 L92,108 L104,108 L94,130 L120,98 L106,98 Z" fill="#FFC857"/>
        <g class="drops">
          <line class="drop" x1="74" y1="92" x2="68" y2="106"/>
          <line class="drop" x1="138" y1="92" x2="132" y2="106"/>
        </g>
      </g>

      <g id="scene-snow">
        <g class="cloud-single">
          <ellipse cx="100" cy="56" rx="42" ry="23" fill="rgba(255,255,255,.92)"/>
          <ellipse cx="130" cy="50" rx="28" ry="19" fill="rgba(255,255,255,.92)"/>
          <ellipse cx="74" cy="60" rx="24" ry="16" fill="rgba(255,255,255,.92)"/>
        </g>
        <g fill="#fff">
          <circle class="flake" cx="76" cy="94" r="3"/>
          <circle class="flake" cx="100" cy="98" r="2.4"/>
          <circle class="flake" cx="124" cy="92" r="3"/>
          <circle class="flake" cx="88" cy="106" r="2"/>
          <circle class="flake" cx="112" cy="108" r="2.6"/>
          <circle class="flake" cx="140" cy="100" r="2.2"/>
        </g>
      </g>

      <g id="scene-mist">
        <g fill="rgba(255,255,255,.55)">
          <rect class="fog" x="28" y="48" width="144" height="7" rx="3.5"/>
          <rect class="fog" x="48" y="70" width="104" height="7" rx="3.5"/>
          <rect class="fog" x="20" y="92" width="160" height="7" rx="3.5"/>
        </g>
      </g>

    </svg>

    <div class="temp-row">
      <div class="temp" id="temp">--</div>
      <div class="temp-unit" id="tempUnit">°C</div>
    </div>
    <div class="condition" id="condition">&nbsp;</div>
    <div class="city" id="cityName">&nbsp;</div>
    <div class="meta-row">
      <span id="localTime">--:--</span>
      <span id="updatedAt"></span>
    </div>
  </section>

  <!-- Details -->
  <div class="details" id="details">

    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c4 5 7 8.5 7 12a7 7 0 0 1-14 0c0-3.5 3-7 7-12z"/></svg>
        Feels like
      </div>
      <div class="card-value" id="feelsLike">--°</div>
    </div>

    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a4 4 0 0 0 4-4c0-3-4-8-4-8s-4 5-4 8a4 4 0 0 0 4 4z"/></svg>
        Humidity
      </div>
      <div class="card-value" id="humidity">--<small>%</small></div>
    </div>

    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h11a3 3 0 1 0-2-5.2M3 16h13a3 3 0 1 1-2 5.2M3 12h17a2.5 2.5 0 1 0-2-4"/></svg>
        Wind
      </div>
      <div class="card-value" id="wind">--<small id="windUnit"> km/h</small></div>
    </div>

    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21a9 9 0 1 0-9-9M12 21a9 9 0 1 1 9-9M12 12l4-3"/></svg>
        Pressure
      </div>
      <div class="card-value" id="pressure">--<small> hPa</small></div>
    </div>

    <div class="card">
      <div class="card-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        Visibility
      </div>
      <div class="card-value" id="visibility">--<small id="visUnit"> km</small></div>
    </div>

    <div class="card span-2">
      <div>
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8M4.93 10.93l1.41 1.41M2 18h2M20 18h2M19.07 10.93l-1.41 1.41M22 22H2M16 6l-4 4-4-4"/></svg>
          Sunrise
        </div>
        <div class="card-value" id="sunrise">--:--</div>
      </div>
      <div>
        <div class="card-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10V2M4.93 17.07l1.41-1.41M2 22h2M20 22h2M19.07 17.07l-1.41-1.41M22 22H2M16 6l-4-4-4 4"/></svg>
          Sunset
        </div>
        <div class="card-value" id="sunset">--:--</div>
      </div>
    </div>

  </div>

  <div class="footnote">Data from OpenWeatherMap</div>

</div>

<script>
  const API_KEY = "db91b82c0e44f679e2c8c6a6e95f6a14";
  const BASE_URL = "https://api.openweathermap.org/data/2.5/weather";

  const els = {
    form: document.getElementById('searchForm'),
    input: document.getElementById('cityInput'),
    locateBtn: document.getElementById('locateBtn'),
    chips: document.getElementById('chips'),
    status: document.getElementById('status'),
    statusTitle: document.getElementById('statusTitle'),
    statusBody: document.getElementById('statusBody'),
    spinner: document.getElementById('spinner'),
    hero: document.getElementById('hero'),
    details: document.getElementById('details'),
    scene: document.getElementById('scene'),
    temp: document.getElementById('temp'),
    tempUnit: document.getElementById('tempUnit'),
    condition: document.getElementById('condition'),
    cityName: document.getElementById('cityName'),
    localTime: document.getElementById('localTime'),
    updatedAt: document.getElementById('updatedAt'),
    feelsLike: document.getElementById('feelsLike'),
    humidity: document.getElementById('humidity'),
    wind: document.getElementById('wind'),
    windUnit: document.getElementById('windUnit'),
    pressure: document.getElementById('pressure'),
    visibility: document.getElementById('visibility'),
    visUnit: document.getElementById('visUnit'),
    sunrise: document.getElementById('sunrise'),
    sunset: document.getElementById('sunset'),
    unitC: document.getElementById('unitC'),
    unitF: document.getElementById('unitF'),
  };

  let state = {
    unit: 'metric',     // 'metric' (°C, km/h) or 'imperial' (°F, mph)
    lastData: null,
    history: []
  };

  // ---------- Theme & scene mapping ----------
  function getTheme(weather){
    const id = weather.id;
    const isNight = (weather.icon || '').endsWith('n');
    if (id === 800) return isNight ? 'clear-night' : 'clear-day';
    if (id > 800)   return isNight ? 'clouds-night' : 'clouds-day';
    if (id >= 200 && id < 300) return 'thunder';
    if (id >= 300 && id < 600) return 'rain';
    if (id >= 600 && id < 700) return 'snow';
    if (id >= 700 && id < 800) return 'mist';
    return 'clear-day';
  }

  const SCENE_BY_THEME = {
    'clear-day': 'sun',
    'clear-night': 'moon',
    'clouds-day': 'clouds',
    'clouds-night': 'clouds',
    'rain': 'rain',
    'thunder': 'thunder',
    'snow': 'snow',
    'mist': 'mist'
  };

  function applyTheme(weather){
    const theme = getTheme(weather);
    document.body.className = 'theme-' + theme;
    els.scene.setAttribute('data-active', SCENE_BY_THEME[theme]);
  }

  // ---------- Status helpers ----------
  function showStatus(title, body, loading){
    els.status.classList.add('visible');
    els.hero.classList.remove('visible');
    els.details.classList.remove('visible');
    els.spinner.style.display = loading ? 'block' : 'none';
    els.statusTitle.textContent = title;
    els.statusBody.textContent = body;
  }

  function hideStatus(){
    els.status.classList.remove('visible');
  }

  // ---------- Formatting helpers ----------
  function formatTime(unixSeconds, tzOffsetSeconds){
    const d = new Date((unixSeconds + tzOffsetSeconds) * 1000);
    let h = d.getUTCHours();
    const m = d.getUTCMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function cToF(c){ return c * 9 / 5 + 32; }
  function msToKmh(ms){ return ms * 3.6; }
  function msToMph(ms){ return ms * 2.237; }

  // ---------- Render ----------
  function render(){
    const data = state.lastData;
    if (!data) return;

    applyTheme(data.weather[0]);

    const isMetric = state.unit === 'metric';
    const tempC = data.main.temp;
    const feelsC = data.main.feels_like;
    const temp = isMetric ? tempC : cToF(tempC);
    const feels = isMetric ? feelsC : cToF(feelsC);

    els.temp.textContent = Math.round(temp);
    els.tempUnit.textContent = isMetric ? '°C' : '°F';
    els.feelsLike.innerHTML = Math.round(feels) + (isMetric ? '°C' : '°F');
    els.condition.textContent = data.weather[0].description;
    els.cityName.textContent = data.name + (data.sys && data.sys.country ? ', ' + data.sys.country : '');

    els.humidity.innerHTML = data.main.humidity + '<small>%</small>';

    const windVal = isMetric ? msToKmh(data.wind.speed) : msToMph(data.wind.speed);
    els.wind.innerHTML = Math.round(windVal) + '<small id="windUnit">' + (isMetric ? ' km/h' : ' mph') + '</small>';

    els.pressure.innerHTML = data.main.pressure + '<small> hPa</small>';

    const visMeters = data.visibility != null ? data.visibility : 10000;
    const vis = isMetric ? (visMeters / 1000) : (visMeters / 1609.34);
    els.visibility.innerHTML = vis.toFixed(1) + '<small>' + (isMetric ? ' km' : ' mi') + '</small>';

    const tz = data.timezone || 0;
    els.sunrise.textContent = formatTime(data.sys.sunrise, tz);
    els.sunset.textContent = formatTime(data.sys.sunset, tz);
    els.localTime.textContent = 'Local time ' + formatTime(Math.floor(Date.now() / 1000), tz);
    els.updatedAt.textContent = 'Updated just now';

    els.hero.classList.add('visible');
    els.details.classList.add('visible');
    hideStatus();
  }

  // ---------- Fetching ----------
  async function fetchWeather(params){
    showStatus('Reading the sky', 'Fetching current conditions...', true);
    try{
      const url = new URL(BASE_URL);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      url.searchParams.set('appid', API_KEY);
      url.searchParams.set('units', 'metric');

      const res = await fetch(url.toString());
      const data = await res.json();

      if (!res.ok){
        showStatus('No match found', data.message ? capitalize(data.message) : 'That place could not be found. Check the spelling and try again.', false);
        return;
      }

      state.lastData = data;
      addToHistory(data.name);
      render();
    }catch(err){
      showStatus('Connection issue', 'Could not reach the weather service. Check your connection and try again.', false);
      console.error(err);
    }
  }

  function capitalize(str){
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function searchCity(city){
    if (!city || !city.trim()) return;
    fetchWeather({ q: city.trim() });
  }

  function useLocation(){
    if (!navigator.geolocation){
      showStatus('Location unavailable', 'Your browser does not support location lookup. Try searching for a city instead.', false);
      return;
    }
    showStatus('Finding you', 'Requesting your location...', true);
    navigator.geolocation.getCurrentPosition(
      pos => fetchWeather({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
      () => showStatus('Location unavailable', 'Permission was denied. Try searching for a city instead.', false)
    );
  }

  // ---------- Recent searches ----------
  function addToHistory(name){
    state.history = state.history.filter(c => c.toLowerCase() !== name.toLowerCase());
    state.history.unshift(name);
    state.history = state.history.slice(0, 5);
    renderChips();
  }

  function renderChips(){
    els.chips.innerHTML = '';
    state.history.forEach(city => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.textContent = city;
      chip.onclick = () => searchCity(city);
      els.chips.appendChild(chip);
    });
  }

  // ---------- Units ----------
  function setUnit(unit){
    if (state.unit === unit) return;
    state.unit = unit;
    els.unitC.classList.toggle('active', unit === 'metric');
    els.unitF.classList.toggle('active', unit === 'imperial');
    if (state.lastData) render();
  }

  // ---------- Events ----------
  els.form.addEventListener('submit', e => {
    e.preventDefault();
    searchCity(els.input.value);
  });

  els.locateBtn.addEventListener('click', useLocation);
</script>

</body>
</html>
